name: Sync upstream and build (origin-enabled)

# Keeps this fork tracking perfect-panel/ppanel-node (so xray-core / feature
# updates flow in automatically) and publishes a linux binary with the
# source-in-source-out `sendThrough: origin` patch enabled, as a rolling
# GitHub Release (tag: origin-latest) for a stable download URL.
#
# Trigger: weekly, or manually via the "Run workflow" button.

on:
  schedule:
    - cron: "0 3 * * 1" # Mondays 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream
        run: |
          git remote add upstream https://github.com/perfect-panel/ppanel-node.git
          git fetch upstream
          UP=$(git rev-parse upstream/master)
          echo "upstream/master = $UP"
          if git merge --no-edit "$UP"; then
            git push origin HEAD:master
          else
            echo "::error::Merge conflict with upstream (likely core/outbound/outbound.go). Rebase the origin patch manually."
            git merge --abort
            exit 1
          fi

      - name: Ensure origin sendThrough is enabled (idempotent safeguard)
        run: |
          f=core/outbound/outbound.go
          sed -i -E 's|^([[:space:]]*)//[[:space:]]*sendthrough := "origin"|\1sendthrough := "origin"|' "$f"
          sed -i -E 's|^([[:space:]]*)//[[:space:]]*outboundDetourConfig\.SendThrough = &sendthrough|\1outboundDetourConfig.SendThrough = \&sendthrough|' "$f"
          echo "---- effective outbound patch ----"
          grep -nE 'sendthrough := "origin"|SendThrough = &sendthrough' "$f"
          test "$(grep -c 'SendThrough = &sendthrough' "$f")" -ge 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Build linux amd64 + arm64 (origin-enabled)
        env:
          CGO_ENABLED: "0"
          GOEXPERIMENT: jsonv2
        run: |
          go mod download
          for arch in amd64 arm64; do
            GOOS=linux GOARCH="$arch" go build -trimpath -ldflags "-s -w -buildid=" -o ppnode .
            mkdir -p "dist-$arch" && cp ppnode "dist-$arch/"
            for g in geoip geosite; do
              curl -fsSL -o "dist-$arch/$g.dat" \
                "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/$g.dat"
            done
            tar -C "dist-$arch" -czf "ppnode-linux-$arch-origin.tar.gz" .
          done
          ls -lh ppnode-linux-*-origin.tar.gz

      - name: Publish rolling release (origin-latest)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete origin-latest --cleanup-tag --yes 2>/dev/null || true
          NOTES="Auto-built $(date -u '+%Y-%m-%d %H:%M UTC') from upstream \`$(git rev-parse --short upstream/master)\` with the sendThrough=origin patch (host-network multi-IP source-in-source-out; TCP/UDP)."
          gh release create origin-latest \
            --title "ppnode (origin, rolling latest)" \
            --notes "$NOTES" \
            --latest \
            ppnode-linux-amd64-origin.tar.gz \
            ppnode-linux-arm64-origin.tar.gz
