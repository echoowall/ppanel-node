name: Build and publish origin-latest

# Builds a linux binary from THIS fork's master (carrying the source-in-source-out
# `sendThrough: origin` patch plus the patched xray-core replace) and publishes it
# as a rolling GitHub Release (tag: origin-latest) for a stable download URL.
#
# Automatic upstream merging is intentionally DISABLED: this fork carries
# substantial patches (notably the xray-core splithttp per-connection local-addr
# fix, without which XHTTP source-in-source-out collapses every entry IP onto one
# address) that a blind weekly merge could clobber. Sync upstream manually and
# re-verify the patches when desired.
#
# Trigger: manual only ("Run workflow").

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4

      - name: Ensure origin sendThrough is enabled (idempotent safeguard)
        run: |
          f=core/outbound/outbound.go
          sed -i -E 's|^([[:space:]]*)//[[:space:]]*sendthrough := "origin"|\1sendthrough := "origin"|' "$f"
          sed -i -E 's|^([[:space:]]*)//[[:space:]]*outboundDetourConfig\.SendThrough = &sendthrough|\1outboundDetourConfig.SendThrough = \&sendthrough|' "$f"
          echo "---- effective outbound patch ----"
          grep -nE 'sendthrough := "origin"|SendThrough = &sendthrough' "$f"
          test "$(grep -c 'SendThrough = &sendthrough' "$f")" -ge 1

      - name: Ensure xray-core points at the patched fork (guard)
        run: |
          # The XHTTP source-in-source-out fix lives in the xray-core fork; refuse
          # to publish a binary that would silently ship the unpatched upstream.
          grep -qE 'replace github.com/xtls/xray-core .*=> github.com/echoowall/xray-core' go.mod \
            || { echo "::error::go.mod is not replacing xray-core with echoowall/xray-core (XHTTP local-addr fix). Re-apply the replace before publishing."; exit 1; }
          grep 'replace github.com/xtls/xray-core' go.mod

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Build linux amd64 + arm64 (origin-enabled)
        env:
          CGO_ENABLED: "0"
          GOEXPERIMENT: jsonv2
        run: |
          go mod download
          for arch in amd64 arm64; do
            GOOS=linux GOARCH="$arch" go build -trimpath -ldflags "-s -w -buildid=" -o ppnode .
            mkdir -p "dist-$arch" && cp ppnode "dist-$arch/"
            for g in geoip geosite; do
              curl -fsSL -o "dist-$arch/$g.dat" \
                "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/$g.dat"
            done
            tar -C "dist-$arch" -czf "ppnode-linux-$arch-origin.tar.gz" .
          done
          ls -lh ppnode-linux-*-origin.tar.gz

      - name: Publish rolling release (origin-latest)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="$GITHUB_REPOSITORY"
          gh release delete origin-latest --repo "$REPO" --cleanup-tag --yes 2>/dev/null || true
          NOTES="Built $(date -u '+%Y-%m-%d %H:%M UTC') from master \`$(git rev-parse --short HEAD)\` with sendThrough=origin + patched xray-core splithttp (host-network multi-IP source-in-source-out; TCP/UDP)."
          gh release create origin-latest \
            --repo "$REPO" \
            --title "ppnode (origin, rolling latest)" \
            --notes "$NOTES" \
            --latest \
            ppnode-linux-amd64-origin.tar.gz \
            ppnode-linux-arm64-origin.tar.gz
